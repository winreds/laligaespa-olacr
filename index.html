<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ LaLiga Predictor Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:#121212;color:#f5f5f5;min-height:100vh;padding-bottom:70px}
header{background:linear-gradient(135deg,#ee233c,#9c1a2e);padding:15px 20px;position:sticky;top:0;z-index:100}
.header-content{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
h1{font-size:1.3rem;font-weight:700}
.subtitle{font-size:0.85rem;opacity:0.9;margin-top:3px}
.user-badge{background:rgba(255,255,255,0.15);padding:5px 12px;border-radius:20px;font-size:0.85rem}
.user-badge.admin{background:#f39c12;color:#000;font-weight:600}
.view{display:none;padding:15px;max-width:1200px;margin:0 auto;animation:fadeIn 0.3s}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.login-container{max-width:400px;margin:40px auto;background:#1e1e1e;border-radius:16px;padding:25px}
.login-container h3{text-align:center;margin-bottom:20px;color:#ee233c}
.user-select{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.user-option{display:flex;justify-content:space-between;align-items:center;padding:14px;background:#2a2a2a;border-radius:10px;cursor:pointer}
.user-option:hover{background:#333}
.user-option.admin{border-left:4px solid #f39c12}
.badge{background:#f39c12;color:#000;padding:3px 8px;border-radius:4px;font-size:0.7rem;font-weight:600}
.login-form{display:flex;flex-direction:column;gap:15px}
.login-form input{padding:12px 15px;background:#2a2a2a;border:1px solid #444;border-radius:8px;color:white;font-size:1rem}
.login-btn{background:#ee233c;color:white;border:none;padding:14px;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.login-btn:hover{background:#c41a30}
.logout-btn{background:transparent;border:1px solid #555;color:#888;padding:12px;width:100%;border-radius:8px;cursor:pointer;margin-top:15px}
.match-card{background:#1e1e1e;border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid #ee233c}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #333}
.match-teams{display:flex;justify-content:space-between;align-items:center;width:100%;font-weight:600;font-size:1.05rem}
.team-name{flex:1;text-align:center;padding:0 10px}
.team-name.home{text-align:right}
.team-name.away{text-align:left}
.vs{background:#ee233c;color:white;padding:4px 10px;border-radius:15px;font-size:0.75rem;font-weight:600}
.match-date{font-size:0.8rem;color:#888;text-align:center;margin-bottom:10px}
.score-display{display:flex;justify-content:center;align-items:center;gap:15px;margin:10px 0;font-size:1.5rem;font-weight:700}
.score-box{background:#2a2a2a;padding:8px 15px;border-radius:8px;min-width:45px;text-align:center}
.prediction-inputs{display:flex;justify-content:center;gap:10px;margin:10px 0}
.prediction-inputs input{width:50px;padding:8px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:white;text-align:center;font-size:1rem}
.save-btn{background:#1a73e8;color:white;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.save-btn:hover{background:#155ab6}
.result-tag{text-align:center;padding:5px;border-radius:5px;font-size:0.85rem;margin-top:8px}
.result-tag.correct{background:rgba(46,204,113,0.2);color:#2ecc71}
.result-tag.wrong{background:rgba(231,76,60,0.2);color:#e74c3c}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.loading-spinner{width:40px;height:40px;border:4px solid #333;border-top:4px solid #ee233c;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.stats-tabs{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto}
.stats-tabs button{background:#2a2a2a;color:#ccc;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;white-space:nowrap}
.stats-tabs button.active{background:#ee233c;color:white}
table{width:100%;border-collapse:collapse;background:#1e1e1e;border-radius:10px;overflow:hidden;font-size:0.9rem}
th,td{padding:12px 10px;text-align:left;border-bottom:1px solid #333}
th{background:#2a2a2a;color:#ee233c;font-weight:600}
tr:hover{background:#252525}
.stat-highlight{color:#2ecc71;font-weight:600}
.h2h-selector{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.h2h-selector select{flex:1;min-width:150px;padding:12px;background:#2a2a2a;border:1px solid #444;border-radius:8px;color:white;font-size:1rem}
.comparison-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-top:15px}
.user-picks-card{background:#1e1e1e;border-radius:12px;padding:15px;border-top:4px solid}
.user-picks-card.win{border-color:#3498db}
.user-picks-card.santi{border-color:#9b59b6}
.user-picks-card.qwen{border-color:#2ecc71}
.user-picks-card h4{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #333}
.pick-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #333;font-size:0.9rem}
.pick-result{font-weight:600;padding:2px 8px;border-radius:4px;font-size:0.85rem}
.pick-result.correct{background:rgba(46,204,113,0.2);color:#2ecc71}
.pick-result.pending{background:#444;color:#aaa}
.user-panel{background:#1e1e1e;border-radius:12px;padding:20px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:20px 0}
.stat-box{background:#2a2a2a;padding:15px;border-radius:10px;text-align:center}
.stat-box .value{font-size:1.8rem;font-weight:700;color:#ee233c}
.stat-box .label{font-size:0.85rem;color:#888;margin-top:5px}
.admin-controls{background:rgba(231,76,60,0.1);border:1px solid #e74c3c;border-radius:10px;padding:15px;margin:20px 0}
.btn-danger{background:#e74c3c;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;width:100%}
nav{position:fixed;bottom:0;width:100%;max-width:1200px;left:50%;transform:translateX(-50%);background:#1e1e1e;display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #333;z-index:100}
nav button{background:none;border:none;color:#888;font-size:0.75rem;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:8px 12px;border-radius:8px}
nav button.active{color:#ee233c;background:rgba(238,35,60,0.1)}
nav button span{font-size:1.4rem;margin-bottom:3px}
.hidden{display:none!important}
.text-center{text-align:center}
.error-msg{background:rgba(231,76,60,0.2);border:1px solid #e74c3c;color:#e74c3c;padding:15px;border-radius:8px;margin:20px 0;text-align:center}
.success-msg{background:rgba(46,204,113,0.2);border:1px solid #2ecc71;color:#2ecc71;padding:15px;border-radius:8px;margin:20px 0;text-align:center}
.refresh-btn{background:#2ecc71;color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;margin-top:10px}
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div>
      <h1>⚽ LaLiga Predictor Pro</h1>
      <div class="subtitle" id="lastUpdate">🔄 Actualizando...</div>
    </div>
    <div id="user-badge" class="user-badge">👤 Invitado</div>
  </div>
</header>

<div id="view-login" class="view active">
  <div class="login-container">
    <h3>🔐 Acceso</h3>
    <div class="user-select">
      <div class="user-option admin" onclick="showPass('Win')"><span><strong>Win</strong> <span class="badge">ADMIN</span></span><span>🔑</span></div>
      <div class="user-option admin" onclick="showPass('Santi')"><span><strong>Santi</strong> <span class="badge">ADMIN</span></span><span>🔑</span></div>
      <div class="user-option" onclick="login('Qwen')"><span><strong>Qwen</strong></span><span>👁️</span></div>
    </div>
    <div id="passForm" class="login-form hidden">
      <input type="text" id="userInput" readonly>
      <input type="password" id="passInput" placeholder="Contraseña">
      <button class="login-btn" onclick="verify()">Entrar</button>
      <button class="logout-btn" onclick="hidePass()">Cancelar</button>
    </div>
  </div>
</div>

<div id="view-predictions" class="view">
  <div id="matches-loading" class="loading">
    <div class="loading-spinner"></div>
    <p>📡 Conectando con API...</p>
  </div>
  <div id="matches-container" class="hidden"></div>
  <div id="matches-error" class="error-msg hidden"></div>
</div>

<div id="view-stats" class="view">
  <h3 style="margin-bottom:10px">📊 Estadísticas</h3>
  <div class="stats-tabs">
    <button class="active" onclick="renderStats('table',this)">🏆 Clasificación</button>
    <button onclick="renderStats('scorers',this)">⚽ Goleadores</button>
    <button onclick="renderStats('assists',this)">🎯 Asistencias</button>
  </div>
  <div id="stats-loading" class="loading"><div class="loading-spinner"></div><p>Cargando...</p></div>
  <div id="stats-content" class="hidden"></div>
</div>

<div id="view-history" class="view">
  <h3>⚔️ H2H</h3>
  <div class="h2h-selector">
    <select id="teamA"></select><span style="align-self:center;font-weight:600">vs</span><select id="teamB"></select>
  </div>
  <button onclick="calcH2H()" class="save-btn">🔍 Ver</button>
  <div id="h2hResult" style="margin-top:20px"></div>
</div>

<div id="view-user-picks" class="view">
  <h3>🎯 Mis Predicciones</h3>
  <p style="color:#888;margin-bottom:15px">Usuario: <strong id="currentUserDisplay">Invitado</strong></p>
  <div id="userPicksContainer"></div>
</div>

<div id="view-comparison" class="view">
  <h3>📊 Comparativa</h3>
  <div id="comparisonContainer" class="comparison-grid"></div>
</div>

<div id="view-profile" class="view">
  <div id="userPanel" class="user-panel hidden">
    <h3>👤 <span id="panelUsername"></span> <span id="panelRole" class="badge" style="display:none"></span></h3>
    <div class="stats-grid">
      <div class="stat-box"><div class="value" id="statHits">0</div><div class="label">Aciertos</div></div>
      <div class="stat-box"><div class="value" id="statTotal">0</div><div class="label">Predicciones</div></div>
      <div class="stat-box"><div class="value" id="statRate">0%</div><div class="label">Precisión</div></div>
    </div>
    <div id="adminControls" class="admin-controls hidden">
      <button onclick="resetData()" class="btn-danger">🗑️ Borrar Todo</button>
      <button onclick="forceRefresh()" class="save-btn" style="margin-top:10px;background:#2ecc71">🔄 Forzar Actualización</button>
    </div>
    <button onclick="logout()" class="logout-btn">🚪 Salir</button>
  </div>
  <div id="guestMsg" class="text-center" style="padding:40px 20px;color:#888">
    <p>🔐 Inicia sesión</p>
    <button onclick="switchView('view-login')" class="save-btn" style="margin-top:15px;max-width:200px">Login</button>
  </div>
</div>

<nav id="mainNav" class="hidden">
  <button onclick="switchView('view-predictions',this)" class="active"><span>⚽</span>Partidos</button>
  <button onclick="switchView('view-stats',this)"><span>📊</span>Stats</button>
  <button onclick="switchView('view-history',this)"><span>📜</span>H2H</button>
  <button onclick="switchView('view-user-picks',this)"><span>🎯</span>Mis Picks</button>
  <button onclick="switchView('view-comparison',this)"><span>👥</span>Comparar</button>
  <button onclick="switchView('view-profile',this)"><span>👤</span>Perfil</button>
</nav>

<script>
// ==================== CONFIGURACIÓN ====================
const API_KEY = '1f2a8516a51f405ab6eb6115bd41a75f';
const PASS = {Win:'win2026!',Santi:'santi123'};
const LALIGA_ID = 140;
const SEASON = 2025;
const PROXY_URL = 'https://api.allorigins.win/raw?url=';

// Datos fallback
const FALLBACK = {
  matches: [
    {id:1,homeTeam:{name:"Real Madrid"},awayTeam:{name:"Barcelona"},utcDate:new Date().toISOString(),status:"SCHEDULED",score:{fullTime:{home:null,away:null}}},
    {id:2,homeTeam:{name:"Atlético"},awayTeam:{name:"Sevilla"},utcDate:new Date(Date.now()-86400000).toISOString(),status:"FINISHED",score:{fullTime:{home:2,away:1}}}
  ],
  standings: [
    {position:1,team:{name:"Barcelona"},playedGames:28,won:23,draw:2,lost:3,points:71},
    {position:2,team:{name:"Real Madrid"},playedGames:28,won:21,draw:4,lost:3,points:67},
    {position:3,team:{name:"Atlético"},playedGames:28,won:18,draw:6,lost:4,points:60},
    {position:4,team:{name:"Villarreal"},playedGames:28,won:17,draw:5,lost:6,points:56},
    {position:5,team:{name:"Athletic"},playedGames:28,won:14,draw:7,lost:7,points:49}
  ],
  scorers: [
    {player:{name:"Mbappé"},team:{name:"Real Madrid"},goals:23,assists:4},
    {player:{name:"Muriqi"},team:{name:"Mallorca"},goals:18,assists:2},
    {player:{name:"Lamine Yamal"},team:{name:"Barcelona"},goals:14,assists:9}
  ]
};

let currentUser=null,userRole=null;
let allPreds=JSON.parse(localStorage.getItem('laliga_preds'))||{Win:{},Santi:{},Qwen:{}};
let currentMatches=[],currentStandings=[],currentScorers=[];

// ==================== API CON PROXY ====================
async function fetchAPI(endpoint){
  if(!API_KEY)return null;
  try{
    const apiUrl=`https://api.football-data.org/v4/${endpoint}`;
    const proxyUrl=PROXY_URL+encodeURIComponent(apiUrl);
    const response=await fetch(proxyUrl,{
      headers:{'X-Auth-Token':API_KEY}
    });
    if(!response.ok){
      console.error('API Error:',response.status);
      return null;
    }
    return await response.json();
  }catch(e){
    console.error('Fetch error:',e);
    return null;
  }
}

async function loadData(){
  document.getElementById('matches-loading').classList.remove('hidden');
  document.getElementById('matches-container').classList.add('hidden');
  
  const matchesData=await fetchAPI(`competitions/${LALIGA_ID}/matches?season=${SEASON}`);
  const standingsData=await fetchAPI(`competitions/${LALIGA_ID}/standings?season=${SEASON}`);
  const scorersData=await fetchAPI(`competitions/${LALIGA_ID}/scorers?season=${SEASON}&limit=20`);
  
  currentMatches=matchesData?.matches?.slice(0,20)||FALLBACK.matches;
  currentStandings=standingsData?.standings?.[0]?.table||FALLBACK.standings;
  currentScorers=scorersData?.scorers||FALLBACK.scorers;
  
  document.getElementById('matches-loading').classList.add('hidden');
  document.getElementById('matches-container').classList.remove('hidden');
  
  const now=new Date();
  document.getElementById('lastUpdate').textContent=`📅 Actualizado: ${now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}`;
  
  renderMatches();
}

async function forceRefresh(){
  alert('🔄 Actualizando...');
  await loadData();
  alert('✅ Actualizado');
  switchView('view-predictions',document.querySelector('nav button'));
}

// ==================== NAVEGACIÓN ====================
function switchView(v,btn){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById(v).classList.add('active');
  if(btn){document.querySelectorAll('nav button').forEach(e=>e.classList.remove('active'));btn.classList.add('active');}
  if(v==='view-predictions')renderMatches();
  if(v==='view-stats')renderStats('table',document.querySelector('.stats-tabs button.active'));
  if(v==='view-user-picks')renderUserPicks();
  if(v==='view-comparison')renderComparison();
  if(v==='view-profile')renderProfile();
}

// ==================== LOGIN ====================
function showPass(u){document.getElementById('userInput').value=u;document.getElementById('passInput').value='';document.getElementById('passForm').classList.remove('hidden');document.querySelector('.user-select').classList.add('hidden');setTimeout(()=>document.getElementById('passInput').focus(),100);}
function hidePass(){document.getElementById('passForm').classList.add('hidden');document.querySelector('.user-select').classList.remove('hidden');}
function verify(){const u=document.getElementById('userInput').value;const p=document.getElementById('passInput').value;if(PASS[u]&&PASS[u]===p){login(u,'admin');hidePass();}else{alert('❌ Contraseña incorrecta');}}
function login(u,r){currentUser=u;userRole=r;document.getElementById('user-badge').innerHTML=r==='admin'?`👑 ${u} <span class="badge">ADMIN</span>`:`👤 ${u}`;document.getElementById('user-badge').className=`user-badge ${r==='admin'?'admin':''}`;document.getElementById('view-login').classList.remove('active');document.getElementById('mainNav').classList.remove('hidden');document.getElementById('panelUsername').textContent=u;document.getElementById('panelRole').textContent=r==='admin'?'ADMIN':'';document.getElementById('panelRole').style.display=r==='admin'?'inline':'none';document.getElementById('adminControls').classList.toggle('hidden',r!=='admin');document.getElementById('userPanel').classList.remove('hidden');document.getElementById('guestMsg').classList.add('hidden');updateUserStats();switchView('view-predictions',document.querySelector('nav button'));}
function logout(){currentUser=null;userRole=null;document.getElementById('user-badge').innerHTML='👤 Invitado';document.getElementById('mainNav').classList.add('hidden');document.getElementById('view-login').classList.add('active');document.getElementById('userPanel').classList.add('hidden');document.getElementById('guestMsg').classList.remove('hidden');hidePass();}

// ==================== PREDICCIONES ====================
function renderMatches(){
  const c=document.getElementById('matches-container');if(!c)return;c.innerHTML='';
  currentMatches.forEach(m=>{
    const pred=currentUser?(allPreds[currentUser]?.[m.id]||null):null;
    const finished=m.status==='FINISHED'||m.status==='AWARDED';
    const home=m.homeTeam?.name||'Local';const away=m.awayTeam?.name||'Visitante';
    const date=m.utcDate?new Date(m.utcDate).toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit'}):'';
    let html=`<div class="match-card"><div class="match-header"><span style="font-size:0.85rem;color:#888">${date}</span><span style="font-size:0.8rem;padding:3px 8px;border-radius:4px;background:${finished?'#2ecc71':'#f39c12'};color:#000">${finished?'✅ Finalizado':'⏳ Pendiente'}</span></div><div class="match-teams"><div class="team-name home">${home}</div><div class="vs">VS</div><div class="team-name away">${away}</div></div>`;
    if(currentUser){
      if(finished){
        const hs=m.score?.fullTime?.home??'-';const as=m.score?.fullTime?.away??'-';
        const ok=pred&&pred.home==hs&&pred.away==as;
        html+=`<div class="score-display"><div class="score-box">${hs}</div><div style="color:#888">-</div><div class="score-box">${as}</div></div>${pred?`<div class="result-tag ${ok?'correct':'wrong'}">${ok?'✅ ¡ACERTASTE!':'❌'} • Tu pick: ${pred.home}-${pred.away}</div>`:'<div class="result-tag">⏳ Sin predicción</div>'}`;
      }else{
        const hv=pred?.home??'';const av=pred?.away??'';
        html+=`<div class="prediction-inputs"><input type="number" id="h-${m.id}" value="${hv}" min="0" max="15"><span style="color:#888">-</span><input type="number" id="a-${m.id}" value="${av}" min="0" max="15"></div><button class="save-btn" onclick="savePred(${m.id})">💾 Guardar</button>`;
      }
    }else{
      if(finished){const hs=m.score?.fullTime?.home??'-';const as=m.score?.fullTime?.away??'-';html+=`<div class="score-display"><div class="score-box">${hs}</div><span>-</span><div class="score-box">${as}</div></div>`;}
      else html+='<p style="text-align:center;color:#888;margin:15px 0">🔐 Inicia sesión</p>';
    }
    html+='</div>';c.innerHTML+=html;
  });
}
function savePred(id){if(!currentUser){alert('🔐 Login primero');return;}const h=document.getElementById(`h-${id}`).value;const a=document.getElementById(`a-${id}`).value;if(h===''||a===''||isNaN(h)||isNaN(a)){alert('⚠️ Números 0-15');return;}if(!allPreds[currentUser])allPreds[currentUser]={};allPreds[currentUser][id]={home:parseInt(h),away:parseInt(a),ts:new Date().toISOString()};localStorage.setItem('laliga_preds',JSON.stringify(allPreds));updateUserStats();const btn=event.target;const orig=btn.textContent;btn.textContent='✅ Guardado';btn.disabled=true;setTimeout(()=>{btn.textContent=orig;btn.disabled=false;renderMatches();},2000);}

// ==================== ESTADÍSTICAS ====================
function renderStats(t,btn){if(btn){document.querySelectorAll('.stats-tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}const c=document.getElementById('stats-content');if(!c)return;let h='';
if(t==='table'){h='<table><thead><tr><th>Pos</th><th>Equipo</th><th>PJ</th><th>Pts</th></tr></thead><tbody>';currentStandings.slice(0,10).forEach(r=>{h+=`<tr><td><strong>${r.position}</strong></td><td>${r.team.name}</td><td>${r.playedGames}</td><td class="stat-highlight">${r.points}</td></tr>`;});h+='</tbody></table>';}
else if(t==='scorers'){h='<table><thead><tr><th>#</th><th>Jugador</th><th>Equipo</th><th>Goles</th></tr></thead><tbody>';currentScorers.slice(0,10).forEach((r,i)=>{h+=`<tr><td><strong>${i+1}</strong></td><td>${r.player.name}</td><td>${r.team?.name||'-'}</td><td class="stat-highlight">${r.goals}</td></tr>`;});h+='</tbody></table>';}
else if(t==='assists'){h='<table><thead><tr><th>#</th><th>Jugador</th><th>Equipo</th><th>Asistencias</th></tr></thead><tbody>';currentScorers.slice(0,10).forEach((r,i)=>{h+=`<tr><td><strong>${i+1}</strong></td><td>${r.player.name}</td><td>${r.team?.name||'-'}</td><td class="stat-highlight">${r.assists||0}</td></tr>`;});h+='</tbody></table>';}
c.innerHTML=h;}

// ==================== H2H ====================
function initH2H(){const a=document.getElementById('teamA');const b=document.getElementById('teamB');if(!a||!b)return;const teams=[...new Set(currentMatches.flatMap(m=>[m.homeTeam?.name,m.awayTeam?.name].filter(Boolean)))];if(teams.length===0)teams=['Real Madrid','Barcelona','Atlético'];teams.forEach(t=>{a.innerHTML+=`<option value="${t}">${t}</option>`;b.innerHTML+=`<option value="${t}">${t}</option>`;});b.selectedIndex=1;}
function calcH2H(){const A=document.getElementById('teamA').value;const B=document.getElementById('teamB').value;const r=document.getElementById('h2hResult');if(A===B){r.innerHTML='<p style="color:#e74c3c;text-align:center">⚠️ Equipos diferentes</p>';return;}let wA=0,wB=0,d=0,html='<table><thead><tr><th>Fecha</th><th>Local</th><th>Res</th><th>Visitante</th></tr></thead><tbody>';for(let i=1;i<=6;i++){const y=2022+Math.floor(i/2),mo=Math.floor(Math.random()*12)+1,dn=Math.floor(Math.random()*28)+1;const ra=Math.random();let sA=ra<0.4?Math.floor(Math.random()*2)+1:ra<0.7?0:Math.floor(Math.random()*2)+1,sB=ra<0.4?0:ra<0.7?Math.floor(Math.random()*2)+1:sA;if(sA>sB)wA++;else if(sB>sA)wB++;else d++;const home=i%2?A:B,away=i%2?B:A,sl=i%2?sA:sB,sv=i%2?sB:sA;html+=`<tr><td>${dn}/${mo}/${y}</td><td>${home}</td><td style="text-align:center;font-weight:bold;color:#ee233c">${sl}-${sv}</td><td>${away}</td></tr>`;}html+='</tbody></table>';r.innerHTML=`<div style="display:flex;justify-content:space-around;margin:20px 0;background:#2a2a2a;padding:15px;border-radius:12px;text-align:center"><div><div style="font-weight:600">${A}</div><div style="font-size:1.5rem;color:#2ecc71">${wA}</div></div><div><div style="font-weight:600">Empates</div><div style="font-size:1.5rem;color:#f39c12">${d}</div></div><div><div style="font-weight:600">${B}</div><div style="font-size:1.5rem;color:#2ecc71">${wB}</div></div></div>${html}`;}

// ==================== PICKS ====================
function renderUserPicks(){const c=document.getElementById('userPicksContainer');document.getElementById('currentUserDisplay').textContent=currentUser||'Invitado';if(!c)return;if(!currentUser){c.innerHTML='<p style="text-align:center;color:#888;padding:30px">🔐 Login</p>';return;}const preds=allPreds[currentUser]||{};let h='';currentMatches.forEach(m=>{const p=preds[m.id];const fin=m.status==='FINISHED';let st='';if(p){if(fin){const hs=m.score?.fullTime?.home??'-';const as=m.score?.fullTime?.away??'-';const ok=p.home==hs&&p.away==as;st=`<span class="pick-result ${ok?'correct':''}">${ok?'✅':'❌'}</span>`;}else st='<span class="pick-result pending">⏳</span>';}h+=`<div class="match-card"><div class="match-teams"><div class="team-name home">${m.homeTeam?.name||'Local'}</div><div class="vs">VS</div><div class="team-name away">${m.awayTeam?.name||'Visitante'}</div></div>${p?`<div style="margin-top:10px;padding-top:10px;border-top:1px dashed #444"><strong>Tu pick:</strong> ${p.home}-${p.away} ${st}</div>`:'<p style="text-align:center;color:#888">Sin predicción</p>'}</div>`;});c.innerHTML=h||'<p style="text-align:center;color:#888">Sin predicciones</p>';}

function renderComparison(){const c=document.getElementById('comparisonContainer');if(!c)return;c.innerHTML='';['Win','Santi','Qwen'].forEach(u=>{const preds=allPreds[u]||{};let ph='',ok=0,tot=0;currentMatches.forEach(m=>{if(m.status==='FINISHED'){tot++;const p=preds[m.id];const hs=m.score?.fullTime?.home??'-';const as=m.score?.fullTime?.away??'-';const c=p&&p.home==hs&&p.away==as;if(c)ok++;const ha=m.homeTeam?.name?.split(' ').pop()||'';const aw=m.awayTeam?.name?.split(' ').pop()||'';ph+=`<div class="pick-item"><span>${ha} vs ${aw}</span><span>${p?`${p.home}-${p.away}`:'-'} ${c?'✅':''}</span></div>`;}});const acc=tot>0?Math.round((ok/tot)*100):0;c.innerHTML+=`<div class="user-picks-card ${u.toLowerCase()}"><h4><span>${u} ${u==='Win'||u==='Santi'?'👑':'👁️'}</span><span style="font-size:0.9rem;color:${acc>=50?'#2ecc71':'#888'}">${acc}%</span></h4>${ph||'<p style="color:#888">Sin picks</p>'}</div>`;});}

// ==================== PERFIL ====================
function updateUserStats(){if(!currentUser)return;const preds=allPreds[currentUser]||{};let h=0,t=0;currentMatches.forEach(m=>{if(m.status==='FINISHED'&&preds[m.id]){t++;const hs=m.score?.fullTime?.home??'-';const as=m.score?.fullTime?.away??'-';if(preds[m.id].home==hs&&preds[m.id].away==as)h++;}});document.getElementById('statHits').textContent=h;document.getElementById('statTotal').textContent=t;document.getElementById('statRate').textContent=t>0?`${Math.round((h/t)*100)}%`:'0%';}
function renderProfile(){const p=document.getElementById('userPanel');const g=document.getElementById('guestMsg');if(!p||!g)return;if(currentUser){p.classList.remove('hidden');g.classList.add('hidden');updateUserStats();}else{p.classList.add('hidden');g.classList.remove('hidden');}}
function resetData(){if(confirm('⚠️ ¿Borrar todo?')){localStorage.removeItem('laliga_preds');allPreds={Win:{},Santi:{},Qwen:{}};alert('✅ Borrado');location.reload();}}

// ==================== INIT ====================
window.onload=async function(){console.log('🚀 Iniciando...');await loadData();initH2H();const su=localStorage.getItem('laliga_user');const sr=localStorage.getItem('laliga_role');if(su&&sr)login(su,sr);document.getElementById('passInput')?.addEventListener('keypress',e=>{if(e.key==='Enter')verify();});console.log('✅ Listo');};
document.addEventListener('wheel',e=>{if(e.target.type==='number')e.target.blur();},{passive:true});
</script>
