// ===== NAVEGACIÓN =====
function switchView(v,btn){

  if(v==='view-stats'){renderStats('table',document.querySelector('.stats-tabs button.active'));}
  if(v==='view-user-picks'){renderUserPicks();}

}

// ===== LOGIN =====
function showPass(u){
  document.getElementById('userInput').value=u;
  document.getElementById('passInput').value='';
  document.getElementById('passForm').classList.remove('hidden');
  document.querySelector('.user-select').classList.add('hidden');
  setTimeout(()=>document.getElementById('passInput').focus(),100);
}
function hidePass(){
  document.getElementById('passForm').classList.add('hidden');
  document.querySelector('.user-select').classList.remove('hidden');
}
function verify(){
  const u=document.getElementById('userInput').value;
  const p=document.getElementById('passInput').value;
  console.log('Verificando:',u,p,PASS[u]);
  if(PASS[u]&&PASS[u]===p){
    login(u,'admin');
    hidePass();
  }else{
    alert('❌ Contraseña incorrecta\n\nWin: win2026!\nSanti: santi123');
    document.getElementById('passInput').value='';
    document.getElementById('passInput').focus();
  }
}
function login(u,r){
  console.log('Login exitoso:',u,r);
  currentUser=u;
  userRole=r;
  
  // Actualizar badge
  const badge=document.getElementById('user-badge');
  badge.innerHTML=r==='admin'?`👑 ${u} <span class="badge">ADMIN</span>`:`👤 ${u}`;
  badge.className=`user-badge ${r==='admin'?'admin':''}`;
  
  // Mostrar navegación
  document.getElementById('view-login').classList.remove('active');
  document.getElementById('mainNav').classList.remove('hidden');
  
  // Actualizar panel
  document.getElementById('panelUsername').textContent=u;
  document.getElementById('panelRole').textContent=r==='admin'?'ADMIN':'';
  document.getElementById('panelRole').style.display=r==='admin'?'inline':'none';
  document.getElementById('adminControls').classList.toggle('hidden',r!=='admin');
  document.getElementById('userPanel').classList.remove('hidden');
  document.getElementById('guestMsg').classList.add('hidden');
  
  // Guardar en localStorage
  try{
    localStorage.setItem('laliga_current_user',u);
    localStorage.setItem('laliga_current_role',r);
  }catch(e){console.log('Error localStorage:',e);}
  
  updateUserStats();
  
  // Ir a predicciones
  const firstNavBtn=document.querySelector('nav button');
  switchView('view-predictions',firstNavBtn);
}
function logout(){
  console.log('Logout');
  currentUser=null;
  userRole=null;
  
  document.getElementById('user-badge').innerHTML='👤 Invitado';
  document.getElementById('user-badge').className='user-badge';
  document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('view-login').classList.add('active');
  
  // Limpiar vistas
  document.querySelectorAll('.view').forEach(e=>{
    if(e.id!=='view-login')e.classList.remove('active');
  });
  
  hidePass();
  
  try{
    localStorage.removeItem('laliga_current_user');
    localStorage.removeItem('laliga_current_role');
  }catch(e){}
}

// ===== PREDICCIONES - FUNCIÓN CORREGIDA =====
function renderMatches(){
  console.log('renderMatches - Usuario:',currentUser,'Predicciones:',allPreds);
  const container=document.getElementById('matches-container');
  if(!container){
    console.error('No se encontró matches-container');
    return;
  }
  container.innerHTML='';
  
  MATCHES.forEach(m=>{
    console.log('Procesando match:',m.id,m.home,'vs',m.away,'Status:',m.status);
    
    const pred=currentUser?(allPreds[currentUser]&&allPreds[currentUser][m.id]?allPreds[currentUser][m.id]:null):null;
    const isFinished=(m.status==='finished');
    
    console.log('Match',m.id,'- Finished:',isFinished,'Pred:',pred);
    
    let predHTML='';
    
    if(currentUser){
      if(isFinished&&m.result){
        // Mostrar resultado final
        const isCorrect=(pred&&pred.home==m.result.home&&pred.away==m.result.away);
        predHTML=`
          <div class="score-display">
            <div class="score-box">${m.result.home}</div>
            <div style="color:#888;font-size:1rem">-</div>
            <div class="score-box">${m.result.away}</div>
          </div>
          ${pred?`
            <div class="result-tag ${isCorrect?'correct':'wrong'}">
              ${isCorrect?'✅ ¡ACERTASTE!':'❌ No acertado'} • Tu pick: ${pred.home}-${pred.away}
            </div>
          `:'<div class="result-tag pending">⏳ Sin predicción</div>'}
        `;
      }else{
        // Mostrar inputs para predecir
        const homeVal=(pred&&pred.home!==undefined)?pred.home:'';
        const awayVal=(pred&&pred.away!==undefined)?pred.away:'';
        
        console.log('Inputs - homeVal:',homeVal,'awayVal:',awayVal);
        
        predHTML=`
          <div class="prediction-inputs">
            <input type="number" id="home-${m.id}" value="${homeVal}" min="0" max="15" placeholder="?">
            <span style="font-weight:600;color:#888">-</span>
            <input type="number" id="away-${m.id}" value="${awayVal}" min="0" max="15" placeholder="?">
          </div>
          <button class="save-btn" onclick="savePrediction(${m.id})">💾 Guardar Predicción</button>
        `;
      }
    }else{
      // No hay usuario logueado
      if(isFinished&&m.result){
        predHTML=`
          <div class="score-display">
            <div class="score-box">${m.result.home}</div>
            <span style="color:#888">-</span>
            <div class="score-box">${m.result.away}</div>
          </div>
        `;
      }else{
        predHTML=`<p style="text-align:center;color:#888;margin:15px 0">🔐 Inicia sesión para predecir</p>`;
      }
    }
    
    const matchHTML=`
      <div class="match-card">
        <div class="match-header">
          <span style="font-size:0.85rem;color:#888">${m.date}</span>
          <span style="font-size:0.8rem;padding:3px 8px;border-radius:4px;background:${isFinished?'#2ecc71':'#f39c12'};color:#000;font-weight:600">
            ${isFinished?'✅ Finalizado':'⏳ Pendiente'}
          </span>
        </div>
        <div class="match-teams">
          <div class="team-name home">${m.home}</div>
          <div class="vs">VS</div>
          <div class="team-name away">${m.away}</div>
        </div>
        ${predHTML}
      </div>
    `;
    
    container.innerHTML+=matchHTML;
  });
  
  console.log('Matches renderizados. Total:',MATCHES.length);
}

function savePrediction(matchId){
  console.log('Guardando predicción match:',matchId,'Usuario:',currentUser);
  
  if(!currentUser){
    alert("🔐 Debes iniciar sesión para guardar predicciones");
    switchView('view-login');
    return;
  }
  
  const homeInput=document.getElementById(`home-${matchId}`);
  const awayInput=document.getElementById(`away-${matchId}`);
  
  if(!homeInput||!awayInput){
    console.error('No se encontraron los inputs para match:',matchId);
    alert("❌ Error: No se encontraron los campos de entrada");
    return;
  }
  
  const home=homeInput.value.trim();
  const away=awayInput.value.trim();
  
  console.log('Valores:',home,away);
  
  if(home===''||away===''||isNaN(home)||isNaN(away)){
    alert("⚠️ Introduce ambos marcadores (números del 0 al 15)");
    return;
  }
  
  const homeNum=parseInt(home);
  const awayNum=parseInt(away);
  
  if(homeNum<0||homeNum>15||awayNum<0||awayNum>15){
    alert("⚠️ Los marcadores deben estar entre 0 y 15");
    return;
  }
  
  // Inicializar objeto si no existe
  if(!allPreds[currentUser]){
    allPreds[currentUser]={};
  }
  
  // Guardar predicción
  allPreds[currentUser][matchId]={
    home:homeNum,
    away:awayNum,
    timestamp:new Date().toISOString()
  };
  
  console.log('Predicción guardada:',allPreds[currentUser][matchId]);
  
  // Guardar en localStorage
  try{
    localStorage.setItem('laliga_preds',JSON.stringify(allPreds));
    console.log('Guardado en localStorage');
  }catch(e){
    console.error('Error guardando en localStorage:',e);
    alert("⚠️ Error guardando los datos");
    return;
  }
  
  // Actualizar estadísticas
  updateUserStats();
  
  // Feedback visual
  const btn=event.target;
  const originalText=btn.textContent;
  btn.textContent='✅ ¡Guardado!';
  btn.disabled=true;
  btn.style.background='#2ecc71';
  
  setTimeout(()=>{
    btn.textContent=originalText;
    btn.disabled=false;
    btn.style.background='';
  },2000);
  
  // Recargar para mostrar confirmación
  setTimeout(()=>{
    renderMatches();
  },500);
}

// ===== ESTADÍSTICAS =====
function renderStats(type,btn){

  }
  
  const container=document.getElementById('stats-content');
  if(!container)return;
  
  let html='';
  
  if(type==='table'){
    html='<table><thead><tr><th>Pos</th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr></thead><tbody>';
    TABLE.forEach(r=>{
      const posClass=r.pos<=4?`pos-${r.pos}`:'';
      html+=`<tr class="${posClass}">
        <td><strong>${r.pos}</strong></td>
        <td>${r.team}</td>
        <td>${r.pj}</td><td>${r.pg}</td><td>${r.pe}</td><td>${r.pp}</td>
        <td>${r.gf}</td><td>${r.gc}</td>
        <td class="stat-highlight">${r.gf-r.gc>=0?'+':''}${r.gf-r.gc}</td>
        <td><strong>${r.pts}</strong></td>
      </tr>`;
    });
    html+='</tbody></table>';
  }else if(type==='scorers'){
    html='<table><thead><tr><th>#</th><th>Jugador</th><th>Equipo</th><th>Goles</th></tr></thead><tbody>';
    SCORERS.forEach(r=>{
      html+=`<tr><td><strong>${r.rank}</strong></td><td>${r.player}</td><td>${r.team}</td><td class="stat-highlight">${r.goals}</td></tr>`;
    });
    html+='</tbody></table><p style="margin-top:10px;font-size:0.85rem;color:#888">🏆 Pichichi: Mbappé (23 goles)</p>';
  }else if(type==='assists'){
    html='<table><thead><tr><th>#</th><th>Jugador</th><th>Equipo</th><th>Asistencias</th></tr></thead><tbody>';
    ASSISTS.forEach(r=>{
      html+=`<tr><td><strong>${r.rank}</strong></td><td>${r.player}</td><td>${r.team}</td><td class="stat-highlight">${r.assists}</td></tr>`;
    });
    html+='</tbody></table><p style="margin-top:10px;font-size:0.85rem;color:#888">🎯 Líder: Lamine Yamal (9 asistencias)</p>';
  }
  
  container.innerHTML=html;

// ===== H2H =====
function initH2H(){
  const selA=document.getElementById('teamA');
  const selB=document.getElementById('teamB');
  if(!selA||!selB)return;
  
  TEAMS.forEach(t=>{
    selA.innerHTML+=`<option value="${t}">${t}</option>`;
    selB.innerHTML+=`<option value="${t}">${t}</option>`;
  });
  selB.selectedIndex=1;
}

function calcH2H(){
  const teamA=document.getElementById('teamA').value;
  const teamB=document.getElementById('teamB').value;
  const resultDiv=document.getElementById('h2hResult');
  
  if(teamA===teamB){
    resultDiv.innerHTML='<p style="color:#e74c3c;text-align:center;padding:20px">⚠️ Selecciona dos equipos diferentes</p>';
    return;
  }
  
  let winsA=0,winsB=0,draws=0;
  let html='<table><thead><tr><th>Fecha</th><th>Local</th><th>Resultado</th><th>Visitante</th></tr></thead><tbody>';
  
  for(let i=1;i<=6;i++){
    const year=2022+Math.floor(i/2);
    const month=Math.floor(Math.random()*12)+1;
    const day=Math.floor(Math.random()*28)+1;
    
    const rand=Math.random();
    let scoreA,scoreB;
    if(rand<0.35){scoreA=Math.floor(Math.random()*2)+1;scoreB=0;winsA++;}
    else if(rand<0.70){scoreB=Math.floor(Math.random()*2)+1;scoreA=0;winsB++;}
    else{scoreA=Math.floor(Math.random()*2)+1;scoreB=scoreA;draws++;}
    
    const isHomeA=(i%2!==0);
    const local=isHomeA?teamA:teamB;
    const visit=isHomeA?teamB:teamA;
    const sLocal=isHomeA?scoreA:scoreB;
    const sVisit=isHomeA?scoreB:scoreA;
    
    html+=`<tr>
      <td>${day.toString().padStart(2,'0')}/${month.toString().padStart(2,'0')}/${year}</td>
      <td>${local}</td>
      <td style="text-align:center;font-weight:bold;color:#ee233c">${sLocal}-${sVisit}</td>
      <td>${visit}</td>
    </tr>`;
  }
  html+='</tbody></table>';
  
  resultDiv.innerHTML=`
    <div style="display:flex;justify-content:space-around;margin:20px 0;background:#2a2a2a;padding:15px;border-radius:12px;text-align:center">
      <div>
        <div style="font-weight:600;margin-bottom:5px">${teamA}</div>
        <div style="font-size:1.5rem;color:#2ecc71;font-weight:700">${winsA}</div>
        <div style="font-size:0.8rem;color:#888">Victorias</div>
      </div>
      <div>
        <div style="font-weight:600;margin-bottom:5px">Empates</div>
        <div style="font-size:1.5rem;color:#f39c12;font-weight:700">${draws}</div>
        <div style="font-size:0.8rem;color:#888">6 partidos</div>
      </div>
      <div>
        <div style="font-weight:600;margin-bottom:5px">${teamB}</div>
        <div style="font-size:1.5rem;color:#2ecc71;font-weight:700">${winsB}</div>
        <div style="font-size:0.8rem;color:#888">Victorias</div>
      </div>
    </div>
    ${html}
  `;
}

// ===== PICKS USUARIO =====
function renderUserPicks(){
  const container=document.getElementById('userPicksContainer');
  const display=document.getElementById('currentUserDisplay');
  
  if(display)display.textContent=currentUser||'Invitado';
  if(!container)return;
  
  if(!currentUser){
    container.innerHTML='<p style="text-align:center;color:#888;padding:30px">🔐 Inicia sesión para ver tus predicciones</p>';
    return;
  }
  
  const preds=allPreds[currentUser]||{};
  let html='';
  
  MATCHES.forEach(m=>{
    const pred=preds[m.id];
    const isFinished=(m.status==='finished');
    
    let statusHTML='';
    if(pred){
      if(isFinished&&m.result){
        const correct=(pred.home==m.result.home&&pred.away==m.result.away);
        statusHTML=`<span class="pick-result ${correct?'correct':''}">${correct?'✅':'❌'}</span>`;
      }else{
        statusHTML='<span class="pick-result pending">⏳</span>';
      }
    }
    
    html+=`
      <div class="match-card">
        <div class="match-teams">
          <div class="team-name home">${m.home}</div>
          <div class="vs">VS</div>
          <div class="team-name away">${m.away}</div>
        </div>
        <div class="match-date">${m.date}</div>
        ${isFinished&&m.result?`
          <div class="score-display" style="margin:10px 0">
            <div class="score-box">${m.result.home}</div>
            <span>-</span>
            <div class="score-box">${m.result.away}</div>
          </div>
        `:''}
        ${pred?`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed #444">
            <span><strong>Tu pick:</strong> ${pred.home}-${pred.away}</span>
            ${statusHTML}
          </div>
        `:'<p style="text-align:center;color:#888;margin-top:10px">Sin predicción</p>'}
      </div>
    `;
  });
  
  container.innerHTML=html||'<p style="text-align:center;color:#888">Aún no has guardado predicciones</p>';
}

// ===== COMPARATIVA =====
function renderComparison(){
  const container=document.getElementById('comparisonContainer');
  if(!container)return;
  container.innerHTML='';
  
  ['Win','Santi','Qwen'].forEach(u=>{
    const preds=allPreds[u]||{};
    let picksHTML='';
    let correctCount=0;
    let totalFinished=0;
    
    MATCHES.forEach(m=>{
      if(m.status==='finished'&&m.result){
        totalFinished++;
        const pred=preds[m.id];
        const isCorrect=(pred&&pred.home==m.result.home&&pred.away==m.result.away);
        if(isCorrect)correctCount++;
        
        const homeShort=m.home.split(' ').pop();
        const awayShort=m.away.split(' ').pop();
        
        picksHTML+=`
          <div class="pick-item">
            <span>${homeShort} vs ${awayShort}</span>
            <span>${pred?`${pred.home}-${pred.away}`:'-'} ${isCorrect?'✅':''}</span>
          </div>
        `;
      }
    });
    
    const accuracy=totalFinished>0?Math.round((correctCount/totalFinished)*100):0;
    
    container.innerHTML+=`
      <div class="user-picks-card ${u.toLowerCase()}">
        <h4>
          <span>${u} ${u==='Win'||u==='Santi'?'👑':'👁️'}</span>
          <span style="font-size:0.9rem;color:${accuracy>=50?'#2ecc71':'#888'}">${accuracy}% acierto</span>
        </h4>
        ${picksHTML||'<p style="color:#888;font-size:0.9rem">Sin predicciones</p>'}
      </div>
    `;
  });
}

// ===== PERFIL =====
function updateUserStats(){
  if(!currentUser)return;
  
  const preds=allPreds[currentUser]||{};
  let hits=0,total=0;
  
  MATCHES.forEach(m=>{
    if(m.status==='finished'&&m.result&&preds[m.id]){
      total++;
      if(preds[m.id].home==m.result.home&&preds[m.id].away==m.result.away){
        hits++;
      }
    }
  });
  
  const hitsEl=document.getElementById('statHits');
  const totalEl=document.getElementById('statTotal');
  const rateEl=document.getElementById('statRate');
  
  if(hitsEl)hitsEl.textContent=hits;
  if(totalEl)totalEl.textContent=total;
  if(rateEl)rateEl.textContent=total>0?`${Math.round((hits/total)*100)}%`:'0%';
}

function renderProfile(){
  const panel=document.getElementById('userPanel');
  const guest=document.getElementById('guestMsg');
  
  if(!panel||!guest)return;
  
  if(currentUser){
    panel.classList.remove('hidden');
    guest.classList.add('hidden');
    updateUserStats();
  }else{
    panel.classList.add('hidden');
    guest.classList.remove('hidden');
  }
}

// ===== ADMIN =====
function resetData(){
  if(confirm('⚠️ ¿Estás SEGURO de borrar TODAS las predicciones de todos los usuarios?\n\nEsta acción NO se puede deshacer.')){
    localStorage.removeItem('laliga_preds');
    allPreds={Win:{},Santi:{},Qwen:{}};
    alert('✅ Datos borrados correctamente');
    location.reload();
  }
}

// ===== INICIALIZACIÓN =====
window.onload=function(){
  console.log('=== App Iniciada ===');
  console.log('localStorage:',localStorage);
  
  // Cargar datos guardados
  try{
    const saved=localStorage.getItem('laliga_preds');
    if(saved){
      allPreds=JSON.parse(saved);
      console.log('Predicciones cargadas:',allPreds);
    }
    
    // Restaurar sesión si existe
    const savedUser=localStorage.getItem('laliga_current_user');
    const savedRole=localStorage.getItem('laliga_current_role');
    if(savedUser&&savedRole){
      console.log('Restaurando sesión:',savedUser,savedRole);
      login(savedUser,savedRole);
    }
  }catch(e){
    console.error('Error cargando datos:',e);
  }
  
  // Setup H2H
  initH2H();
  
  // Render inicial
  renderMatches();
  renderStats('table',document.querySelector('.stats-tabs button.active'));
  
  // Enter en password
  const passInput=document.getElementById('passInput');
  if(passInput){
    passInput.addEventListener('keypress',function(e){
      if(e.key==='Enter')verify();
    });
  }
  
  console.log('=== App Lista ===');
};

// Prevenir scroll en inputs numéricos
document.addEventListener('wheel',function(e){
  if(e.target.type==='number')e.target.blur();
},{passive:true});
</script>
